    <p id="layout-status" class="layout-status visually-hidden" aria-live="polite"></p>
    <main class="seating-layout container">
    </main>
    <footer>

    </footer>
    <template id="card">
        <div class="card">
            <div class="card__header">
                <h2></h2>
            </div>
            <div class="card__body">
                <ul class="card__list"></ul>
            </div>
        </div>
    </template>
    <template id="seat-row">
        <section class="card seat-row">
            <div class="card__header seat-row__header">
                <h2></h2>
            </div>
            <div class="card__body seat-row__body">
                <div class="seat-row__seats"></div>
            </div>
        </section>
    </template>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/randomcolor/0.6.1/randomColor.min.js"
        integrity="sha512-vPeZ7JCboHcfpqSx5ZD+/jpEhS4JpXxfz9orSvAPPj0EKUVShU2tgy7XkU+oujBJKnWmu4hU7r9MMQNWPfXsYw=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        const shuffle = (arr) => arr.sort(() => .5 - Math.random());

        const createSeatPlan = (list, rowCount, seatsPerRow) => {
            const shuffledStudents = shuffle(Object.assign([], list));
            const capacity = rowCount * seatsPerRow;
            const seatedStudents = shuffledStudents.slice(0, capacity);
            const overflow = shuffledStudents.slice(capacity);
            const seatPool = shuffle([
                ...seatedStudents,
                ...Array(Math.max(capacity - seatedStudents.length, 0)).fill(null)
            ]);
            const rows = [];

            for (let rowIndex = 0; rowIndex < rowCount; rowIndex++) {
                rows.push(seatPool.splice(0, seatsPerRow));
            }

            return {
                rows,
                overflow,
                rowCount,
                seatsPerRow
            };
        };

        let draggedSeatPosition = null;
        let currentSeatPlan = null;
        let showSeatNumbers = false;

        const getStudentLabel = (student) => {
            if (!student) return '';
            return `${student.namn} ${student.efternamn}`.trim();
        };

        const clearDragState = () => {
            draggedSeatPosition = null;
            document.querySelectorAll('.drag-over').forEach((element) => {
                element.classList.remove('drag-over');
            });
        };

        const createSeat = (student, rowIndex, seatIndex, hColor) => {
            const seat = document.createElement('div');
            const seatNumber = document.createElement('span');
            const seatLabel = document.createElement('span');
            const hasStudent = Boolean(student);

            seat.className = 'seat-row__seat';
            seat.dataset.rowIndex = rowIndex;
            seat.dataset.seatIndex = seatIndex;
            seat.style.borderColor = hColor;

            seatNumber.className = 'seat-row__seat-number';
            seatNumber.textContent = `Plats ${seatIndex + 1}`;

            seatLabel.className = 'seat-row__seat-label';
            seatLabel.textContent = hasStudent ? getStudentLabel(student) : 'Tom plats';

            if (!showSeatNumbers) {
                seatNumber.classList.add('visually-hidden');
            }

            if (!hasStudent) {
                seat.classList.add('seat-row__seat--empty');
            } else {
                seat.setAttribute('draggable', 'true');
            }

            seat.addEventListener('dragstart', () => {
                if (!hasStudent) return;
                draggedSeatPosition = { rowIndex, seatIndex };
                seat.classList.add('dragging');
            });

            seat.addEventListener('dragover', (e) => {
                if (!draggedSeatPosition) return;
                e.preventDefault();
            });

            seat.addEventListener('dragenter', () => {
                if (!draggedSeatPosition) return;
                if (draggedSeatPosition.rowIndex === rowIndex && draggedSeatPosition.seatIndex === seatIndex) return;
                seat.classList.add('drag-over');
            });

            seat.addEventListener('dragleave', (e) => {
                if (e.target === seat) {
                    seat.classList.remove('drag-over');
                }
            });

            seat.addEventListener('drop', (e) => {
                if (!draggedSeatPosition) return;
                e.preventDefault();

                const sameSeat = draggedSeatPosition.rowIndex === rowIndex && draggedSeatPosition.seatIndex === seatIndex;
                seat.classList.remove('drag-over');
                if (sameSeat) return;

                const sourceStudent = currentSeatPlan.rows[draggedSeatPosition.rowIndex][draggedSeatPosition.seatIndex];
                const targetStudent = currentSeatPlan.rows[rowIndex][seatIndex];

                currentSeatPlan.rows[rowIndex][seatIndex] = sourceStudent;
                currentSeatPlan.rows[draggedSeatPosition.rowIndex][draggedSeatPosition.seatIndex] = targetStudent;

                clearDragState();
                renderSeatPlan(currentSeatPlan, hColor);
            });

            seat.addEventListener('dragend', () => {
                seat.classList.remove('dragging');
                clearDragState();
            });

            seat.appendChild(seatNumber);
            seat.appendChild(seatLabel);
            return seat;
        };

        const createSeatRow = (row, rowIndex, hColor, seatsPerRow) => {
            const rowCard = document.querySelector('#seat-row').content.cloneNode(true);
            const header = rowCard.querySelector('.seat-row__header');
            const title = header.querySelector('h2');
            const seats = rowCard.querySelector('.seat-row__seats');
            const leftSeatCount = Math.ceil(seatsPerRow / 2);
            const rightSeatStartIndex = leftSeatCount;

            header.style.backgroundColor = hColor;
            title.textContent = `Rad ${rowIndex + 1}`;
            seats.style.setProperty('--seat-columns', seatsPerRow);
            seats.style.setProperty('--left-seat-columns', leftSeatCount);
            seats.style.setProperty('--right-seat-columns', Math.max(seatsPerRow - leftSeatCount, 0));

            row.forEach((student, seatIndex) => {
                const seat = createSeat(student, rowIndex, seatIndex, hColor);

                if (seatIndex >= rightSeatStartIndex) {
                    seat.style.gridColumn = seatIndex + 2;
                }

                seats.appendChild(seat);
            });

            return rowCard;
        };

        const renderSeatPlan = (seatPlan, hColor) => {
            const main = document.querySelector('.seating-layout');
            const status = document.querySelector('#layout-status');

            main.innerHTML = '';
            seatPlan.rows.forEach((row, index) => {
                main.appendChild(createSeatRow(row, index, hColor, seatPlan.seatsPerRow));
            });

            if (seatPlan.overflow.length > 0) {
                status.classList.remove('visually-hidden');
                status.textContent = `${seatPlan.overflow.length} elever fick inte plats. Öka antal rader eller platser per rad.`;
            } else {
                status.classList.add('visually-hidden');
                status.textContent = '';
            }
        };

        (function () {
            const rawList = new URLSearchParams(window.location.search).get('list');
            const data = rawList ? JSON.parse(decodeURIComponent(rawList)) : [];
            const rowCountInput = document.querySelector('#group-size');
            const seatsPerRowInput = document.querySelector('#number-of-groups');
            const rowCountButton = document.querySelector('#gs-shuffle');
            const seatsPerRowButton = document.querySelector('#nog-shuffle');
            const showSeatNumbersButton = document.querySelector('#show-group-numbers');
            const main = document.querySelector('.seating-layout');

            const color = randomColor({
                luminosity: 'light',
                hue: 'random',
                count: 3
            });

            const parsePositiveValue = (value, fallback) => {
                const parsedValue = parseInt(value, 10);
                return Number.isFinite(parsedValue) && parsedValue > 0 ? parsedValue : fallback;
            };

            const randomizeSeats = () => {
                const rowCount = parsePositiveValue(rowCountInput.value, 3);
                const seatsPerRow = parsePositiveValue(seatsPerRowInput.value, 6);

                rowCountInput.value = rowCount;
                seatsPerRowInput.value = seatsPerRow;
                currentSeatPlan = createSeatPlan(data, rowCount, seatsPerRow);
                renderSeatPlan(currentSeatPlan, color[2]);
            };

            /*
            * display mode
            */
            const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)');
            const currentTheme = localStorage.getItem('theme');
            const displayModeButton = document.querySelector('#display-toggle');

            const showDisplayModeIcon = (btn, theme) => {
                if (theme == 'dark') {
                    btn.querySelector('#dark').classList.remove('d-none');
                    btn.querySelector('#light').classList.add('d-none');
                } else if (theme == 'light') {
                    btn.querySelector('#dark').classList.add('d-none');
                    btn.querySelector('#light').classList.remove('d-none');
                }
            }

            if (currentTheme == 'dark') {
                document.documentElement.setAttribute('display-theme', 'dark');
            } else if (currentTheme == 'light') {
                document.documentElement.setAttribute('display-theme', 'light');
            }

            showDisplayModeIcon(displayModeButton, currentTheme);

            let theme;
            displayModeButton.addEventListener('click', () => {
                if (prefersDarkScheme.matches) {
                    theme = document.documentElement.getAttribute('display-theme') == 'dark' ? 'light' : 'dark';
                } else {
                    theme = document.documentElement.getAttribute('display-theme') == 'dark' ? 'light' : 'dark';
                }
                document.documentElement.setAttribute('display-theme', theme);
                localStorage.setItem('theme', theme);
                showDisplayModeIcon(displayModeButton, theme);
            });

            rowCountButton.classList.add('active');
            seatsPerRowButton.classList.add('active');
            showSeatNumbers = showSeatNumbersButton.classList.contains('active');

            randomizeSeats();
            document.querySelector('nav').style.backgroundColor = color[2];
            main.style.setProperty('--row-color', color[2]);

            document.querySelector('#shuffle').addEventListener('click', () => {
                clearDragState();
                randomizeSeats();
            });

            rowCountInput.addEventListener('change', randomizeSeats);
            seatsPerRowInput.addEventListener('change', randomizeSeats);

            rowCountButton.addEventListener('click', () => {
                clearDragState();
                randomizeSeats();
            });

            seatsPerRowButton.addEventListener('click', () => {
                clearDragState();
                randomizeSeats();
            });

            showSeatNumbersButton.addEventListener('click', () => {
                showSeatNumbers = !showSeatNumbers;
                showSeatNumbersButton.classList.toggle('active');
                if (currentSeatPlan) {
                    renderSeatPlan(currentSeatPlan, color[2]);
                }
            });
        })();
    </script>
</body>
